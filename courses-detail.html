<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Now Learning</title>
    <link rel="stylesheet" href="css/index.css" />
    <link rel="stylesheet" href="css/courses-detail.css" />
  </head>
  <body>
    <!-- Header -->
    <header class="header">
      <nav class="top-navbar">
        <!-- Logo -->
        <div class="logo">
          <a href="index.html">
            <img src="assets/logo.png" alt="Now Learning Logo" />
          </a>
        </div>

        <!-- Thanh tìm kiếm -->
        <div class="search-area">
          <input
            type="search"
            id="course-search"
            class="search-input"
            placeholder="Search for something you need..."
          />
        </div>

        <!-- Tài khoản -->
        <div class="user-actions">
          <a href="login.html" class="login-btn">Log in</a>
          <a href="signup.html" class="signup-btn">Sign up</a>
          <a href="#" class="logout-btn">Log out</a>
        </div>
      </nav>
    </header>

    <!-- Nội dung chính -->
    <div class="page-layout">
      <!-- Sidebar -->
      <aside class="sidebar">
        <nav class="sidebar-nav">
          <ul class="sidebar-menu">
            <li class="menu-item">
              <a href="index.html" class="menu-link"> 🏠 Home </a>
            </li>

            <li class="menu-item">
              <a href="courses.html" class="menu-link"> 📚 Course </a>
            </li>

            <li class="menu-item">
              <a href="#" class="menu-link"> 📝 Practice </a>
            </li>

            <li class="menu-item">
              <a href="#" class="menu-link"> ❓ Questions</a>
            </li>

            <li class="menu-item">
              <a href="#" class="menu-link"> 👤 Profile </a>
            </li>
          </ul>
        </nav>
      </aside>

      <!-- Nội dung -->
      <main class="main-content">
        <!-- Tiêu đề -->
        <section class="course-header">
          <h1 id="courseTitle"></h1>
          <p class="course-meta">
            <span id="courseCategory"></span> • <span id="courseLevel"></span> •
            <span id="courseDuration"></span>
          </p>
        </section>

        <!-- Thông tin -->
        <section class="course-overview">
          <div class="course-image">
            <img id="courseImage" src="" alt="Course Image" />
          </div>

          <div class="course-summary">
            <h2 id="coursePrice"></h2>

            <p id="courseDescription"></p>

            <div class="teacher">
              <strong>Instructor</strong>
              <p id="courseInstructor"></p>
            </div>

            <button class="join-btn" id="actionBtn">Join Now</button>
          </div>
        </section>

        <!-- Danh sách -->
        <section class="lesson-section">
          <h2>Course Content</h2>

          <ul id="lessonList"></ul>
        </section>

        <!-- Đánh giá -->
        <section class="review-section">
          <h2>Student Reviews</h2>

          <div id="reviewList"></div>
        </section>

        <!-- Comment -->
        <section class="write-review">
          <h2>Write Review</h2>

          <textarea
            id="reviewText"
            placeholder="Write your review..."
          ></textarea>

          <button id="submitReview">Submit</button>
        </section>
      </main>
    </div>
    <script src="js/data.js"></script>
    <script src="js/courses-detail.js"></script>
  </body>
</html>
