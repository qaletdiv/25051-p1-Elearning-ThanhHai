<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login</title>
    <link rel="stylesheet" href="css/login.css" />
  </head>
  <body>
    <div class="container">
      <section class="left">
        <div class="left-content">
          <div class="image-box">
            <img src="assets/banner.jpg" alt="Ảnh eLearning" />
          </div>
          <p>Already to become better than yesterday</p>
          <button type="button">LOG IN</button>
        </div>
      </section>
      <section class="right">
        <div class="right-content">
          <div class="form">
            <img class="logo" src="" alt="Logo" />
            <h1>Let's Begin Better</h1>
            <input type="text" placeholder="Enter your name" />
            <input type="email" placeholder="Enter your email" />
            <div class="password">
              <input type="password" placeholder="Minium 8 Characters" />
              <span>SHOW</span>
            </div>
            <button type="button">Sign up</button>
          </div>
        </div>
      </section>
    </div>
  </body>
</html>
