<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login</title>

    <link rel="stylesheet" href="css/login.css" />
  </head>

  <body>
    <div class="container">
      <!-- LEFT -->
      <section class="left">
        <div class="left-content">
          <div class="image-box">
            <img src="assets/banner.jpg" alt="Ảnh eLearning" />
          </div>

          <div class="login-box">
            <p>Already to become better than yesterday</p>

            <button type="button">LOG IN</button>
          </div>

          <div class="partner">
            <span>JOIN 1000+ STUDENTS</span>

            <div class="brands">
              <h2>HTML</h2>
              <h2>CSS</h2>
              <h2>JavaScript</h2>
            </div>
          </div>
        </div>
      </section>

      <!-- RIGHT -->
      <section class="right">
        <div class="right-content">
          <form class="form">
            <img class="logo" src="assets/logo.png" alt="Logo" />

            <h1>Let's Begin Better</h1>

            <input type="text" placeholder="Enter your name" />

            <input type="email" placeholder="Enter your email" />

            <div class="password">
              <input type="password" placeholder="Minimum 8 Characters" />

              <span>SHOW</span>
            </div>

            <button type="submit" class="signup">SIGN UP</button>
          </form>
        </div>
      </section>
    </div>
  </body>
</html>
