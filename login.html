<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login</title>

    <link rel="stylesheet" href="css/signup.css" />
  </head>

  <body>
    <div class="container">
      <!-- LEFT -->
      <section class="left">
        <div class="left-content">
          <div class="image-box">
            <img src="assets/banner.jpg" alt="Ảnh eLearning" />
          </div>

          <div class="login-box">
            <p>Already to become better than yesterday</p>

            <a href="signup.html" class="button">SIGN UP</a>
          </div>

          <div class="partner">
            <span>JOIN 1000+ STUDENTS</span>

            <div class="brands">
              <h2>HTML</h2>
              <h2>CSS</h2>
              <h2>JavaScript</h2>
            </div>
          </div>
        </div>
      </section>

      <!-- RIGHT -->
      <section class="right">
        <div class="right-content">
          <form class="form">
            <img class="logo" src="assets/logo.png" alt="Logo" />

            <h1>Let's Begin Better</h1>

            <input type="email" placeholder="Enter your email" />

            <div class="password">
              <input
                id="password"
                type="password"
                placeholder="Minimum 8 Characters"
              />
              <span class="togglePassword">SHOW</span>
            </div>
            <p id="message"></p>
            <a href="#" class="forgotPass">Forgot your password?</a>
            <button type="submit" class="signup">LOG IN</button>
          </form>
        </div>
      </section>
    </div>
  </body>
  <script src="js/login.js"></script>
</html>
